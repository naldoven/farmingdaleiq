<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FarmingdaleIQ - Offline</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        background: #f7f7f8;
        color: #1c1c1e;
      }
      .wrap {
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 24px;
      }
      .badge {
        width: 64px;
        height: 64px;
        border-radius: 16px;
        background: #e51636;
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 20px;
        margin-bottom: 16px;
      }
      h1 {
        font-size: 18px;
        margin: 0 0 8px;
      }
      p {
        margin: 0;
        color: #6b6b70;
        font-size: 14px;
      }
      button {
        margin-top: 20px;
        border: none;
        border-radius: 8px;
        background: #e51636;
        color: #fff;
        font-size: 14px;
        font-weight: 600;
        padding: 10px 20px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="badge">FIQ</div>
      <h1>You're offline</h1>
      <p>FarmingdaleIQ can't reach the network right now. Reconnect and try again.</p>
      <button onclick="location.reload()">Retry</button>
    </div>
  </body>
</html>
